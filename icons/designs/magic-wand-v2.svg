<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background: white/transparent for versatility -->
  
  <!-- Ribbon swirls (purple/pink) -->
  <!-- Top-left swirl -->
  <path d="M72 48 Q56 48 56 64 Q56 80 72 80 Q80 80 80 72" 
        fill="none" stroke="#C084FC" stroke-width="6" stroke-linecap="round"/>
  <!-- Top-right swirl extending from star -->
  <path d="M176 56 Q200 40 208 56 Q216 72 196 76" 
        fill="none" stroke="#C084FC" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-right swirl -->
  <path d="M192 188 Q208 192 212 208 Q216 224 200 228 Q188 228 188 216" 
        fill="none" stroke="#C084FC" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-left small swirl -->
  <path d="M68 196 Q56 200 56 212 Q56 220 68 220" 
        fill="none" stroke="#C084FC" stroke-width="4" stroke-linecap="round"/>

  <!-- Wand body (diagonal, bottom-left to upper-right) -->
  <g transform="rotate(-45, 128, 128)">
    <!-- Main wand stick -->
    <rect x="48" y="122" width="136" height="14" rx="3" fill="#C084FC"/>
    <!-- Stripe details on wand -->
    <line x1="72" y1="122" x2="64" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <line x1="92" y1="122" x2="84" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <line x1="112" y1="122" x2="104" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <line x1="132" y1="122" x2="124" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <line x1="152" y1="122" x2="144" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <line x1="172" y1="122" x2="164" y2="136" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Star burst at wand tip -->
  <polygon points="168,52 174,72 194,72 178,84 184,104 168,92 152,104 158,84 142,72 162,72" 
           fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
  <!-- Inner star detail -->
  <circle cx="168" cy="80" r="8" fill="#C084FC" opacity="0.7"/>
  
  <!-- Emission lines from star -->
  <line x1="196" y1="56" x2="208" y2="44" stroke="#C084FC" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="72" x2="216" y2="68" stroke="#C084FC" stroke-width="3" stroke-linecap="round"/>
  <line x1="188" y1="44" x2="192" y2="32" stroke="#C084FC" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Sparkle stars (4-pointed, golden) -->
  <!-- Top-left sparkle -->
  <path d="M44 76 L48 68 L52 76 L48 84 Z" fill="#FBBF24"/>
  <path d="M40 76 L48 72 L56 76 L48 80 Z" fill="#FBBF24"/>
  <!-- Left sparkle small -->
  <path d="M36 104 L38 100 L40 104 L38 108 Z" fill="#FBBF24"/>
  <path d="M34 104 L38 102 L42 104 L38 106 Z" fill="#FBBF24"/>
  <!-- Bottom sparkle -->
  <path d="M108 212 L112 204 L116 212 L112 220 Z" fill="#FBBF24"/>
  <path d="M104 212 L112 208 L120 212 L112 216 Z" fill="#FBBF24"/>
  <!-- Right sparkle -->
  <path d="M224 124 L226 120 L228 124 L226 128 Z" fill="#FBBF24"/>
  <path d="M222 124 L226 122 L230 124 L226 126 Z" fill="#FBBF24"/>
  <!-- Center-bottom sparkle -->
  <path d="M140 176 L142 172 L144 176 L142 180 Z" fill="#FBBF24"/>
  <path d="M138 176 L142 174 L146 176 L142 178 Z" fill="#FBBF24"/>
</svg>
